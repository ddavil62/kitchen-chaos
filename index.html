<!-- Kitchen Chaos Defense - 메인 엔트리 HTML. Phaser 3 캔버스를 #game-container에 마운트한다. -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0a00">
  <title>Kitchen Chaos Defense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container"></div>
  <!-- JS 에러 발생 시 화면에 빨간 텍스트로 표시 (Android 디버깅용) -->
  <div id="error-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;background:#ff0000cc;color:#fff;font-size:12px;padding:8px;z-index:9999;word-break:break-all;"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById('error-overlay');
      el.style.display = 'block';
      el.textContent = '[JS ERROR] ' + msg + '\n' + (src || '') + ':' + line;
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('error-overlay');
      el.style.display = 'block';
      el.textContent = '[PROMISE] ' + (e.reason && e.reason.message || e.reason);
    });
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
