<!-- Kitchen Chaos Tycoon - 메인 엔트리 HTML. Phaser 3 캔버스를 #game-container에 마운트한다. -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0a00">
  <title>Kitchen Chaos Tycoon</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preload" href="assets/fonts/NeoDunggeunmoPro-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous">
</head>
<body>
  <div id="game-container"></div>
  <!-- JS 에러 발생 시 화면에 빨간 텍스트로 표시 (Android 디버깅용) -->
  <div id="error-overlay" style="display:none;position:fixed;top:60px;left:0;right:0;max-height:50vh;overflow-y:auto;background:#cc0000ee;color:#fff;font-size:11px;padding:10px;z-index:9999;word-break:break-all;white-space:pre-wrap;font-family:monospace;border-bottom:2px solid #ff6666;"></div>
  <script>
    function showError(text) {
      var el = document.getElementById('error-overlay');
      el.style.display = 'block';
      el.textContent += text + '\n---\n';
    }
    window.onerror = function(msg, src, line, col, err) {
      var file = (src || '').replace(/.*\//, '');
      showError('[ERROR] ' + msg + '\n@ ' + file + ':' + line + (err && err.stack ? '\n' + err.stack.split('\n').slice(0,4).join('\n') : ''));
    };
    window.addEventListener('unhandledrejection', function(e) {
      var reason = e.reason;
      var msg = reason && reason.message ? reason.message : String(reason);
      var stack = reason && reason.stack ? '\n' + reason.stack.split('\n').slice(0,4).join('\n') : '';
      showError('[PROMISE] ' + msg + stack);
    });
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
