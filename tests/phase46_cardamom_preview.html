<!DOCTYPE html>
<html>
<head>

<title>Phase 46 Cardamom AD Mode 2</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: monospace; margin: 30px; }
  h1 { color: #f0c040; }
  .row { display: flex; gap: 40px; align-items: flex-end; flex-wrap: wrap; }
  .item { text-align: center; }
  .label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .name { font-size: 13px; color: #f0c040; margin-top: 6px; }
  img { display: block; image-rendering: pixelated; }
  .scale4 { width: 128px; height: 128px; }
  .divider { border-left: 2px solid #555; margin: 0 10px; }
  h2 { color: #aaa; font-size: 14px; margin-top: 30px; }

</head>
<body>

<div class="row">
  <div class="item">
    <div class="label">신규 (검증 대상)</div>
    <img src="../assets/ingredients/cardamom_new.png" class="scale4">
    <div class="name">cardamom_new.png</div>

  </div>
  <div class="item">
    <img src="../assets/ingredients/cacao.png" class="scale4">
    <div class="name">cacao.png</div>
  </div>
</div>

<h2>실제 크기 (32×32)</h2>
<div class="row">
  <div class="item">
    <img src="../assets/ingredients/cardamom_new.png" width="32" height="32">
